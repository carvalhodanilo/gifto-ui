# Reverse proxy: SPA em / + (no teu stack) /api e /auth.
# MVP: só HTTP :80. Migração HTTPS: ver comentários no fim e README "HTTPS e domínio".

server {
  listen 80;
  server_name _;

  # Copie o build do Vite para este path (exemplo):
  #   /var/www/sales-app/dist
  root /var/www/sales-app/dist;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # No docker-compose do backend, normalmente já existem:
  # location /api/ { ... }
  # location /auth/ { ... }
}

