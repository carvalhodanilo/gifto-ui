server {
  listen 80;
  server_name _;

  # Copie o build do Vite para este path (exemplo):
  #   /var/www/sales-app/dist
  root /var/www/sales-app/dist;
  index index.html;

  # SPA fallback: serve o arquivo solicitado se existir;
  # caso contrário, volta para o index.html (rotas client-side).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Endpoints do backend (já existentes no seu Nginx, conforme MVP):
  # mantenha as configs atuais para /api/* e /auth/*
  #
  # Caso você precise adicionar proxy, descomente e adapte:
  #
  # location /api/ {
  #   proxy_pass http://BACKEND_UPSTREAM/api/;
  # }
  #
  # location /auth/ {
  #   proxy_pass http://BACKEND_UPSTREAM/auth/;
  # }
}
